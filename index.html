<!DOCTYPE html>
<html lang="en" class="bg-[#F8FAFC]">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- font cdn -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- daisyui and tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <style>
      *{
         font-family: "Geist", sans-serif;
      }
    </style>
  <title>GitHub Issue Tracker</title>
</head>
<body class="min-h-screen mx-auto">

  <div class="pt-5">
    <div class="card bg-base-100 w-full max-w-[512px] shrink-0 shadow-2xl mx-auto rounded-2xl">
        <div class="logo mx-auto pt-24 flex justify-center items-center flex-col">
          <img src="./assets/github-logo.png" alt="">
          <h2 class="text-2xl font-semibold text-[#1F2937] mt-6 text-center">GitHub Issues Tracker</h2>
          <p class="text-[#64748B] text-sm">Sign in to manage your issues</p>
        </div>
      <div class="card-body">
        
        <fieldset class="fieldset">
          
          <label class="label font-medium text-[#1F2937]">Username</label>
          <input id="input-username" type="name"
            class="input rounded-md w-full bg-base-200 " placeholder="Enter Username" />
            <p class="text-[#4A00FF]">Defalut : admin</p>
          <br>
          <label class="label text-[#1F2937] font-medium">Password</label>
          <input id="input-password" type=""
            class="input rounded-md w-full bg-base-200" placeholder="Enter Password" />
            <p class="text-[#4A00FF]">Defalut : admin123</p>
          <button id="sign-btn" class="btn btn-primary mt-4 rounded-md font-semibold">Sign In</button>
        </fieldset>
        <div class="relative text-center my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <span class="relative bg-white px-3 text-gray-500">OR</span>
        </div>
        <div>
          <h3 class="text-[#64748B] text-sm text-center">Demo Credentials:</h3>
        </div>
        <div class="bg-slate-100 p-10 text-center">
          <p><span class="font-semibold text-[#1F2937]">Username:</span>admin</p>
          <p><span class="font-semibold text-[#1F2937]">Password:</span>admin123</p>
        </div>
      </div>
    </div>
  </div>
  <script src="./script/login.js"></script>
</body>
</html>
